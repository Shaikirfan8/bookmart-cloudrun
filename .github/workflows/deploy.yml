name: BookMart CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/405188726817/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@my-project-007-499807.iam.gserviceaccount.com

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
          -t us-central1-docker.pkg.dev/my-project-007-499807/bookmart-repo/bookmart-nginx:${{ github.sha }} \
          ./app

      - name: Push Docker Image
        run: |
          docker push us-central1-docker.pkg.dev/my-project-007-499807/bookmart-repo/bookmart-nginx:${{ github.sha }}